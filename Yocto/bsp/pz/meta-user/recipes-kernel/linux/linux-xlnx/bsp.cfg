# Required by all designs
CONFIG_XILINX_GMII2RGMII=y
CONFIG_NET_VENDOR_MARVELL=y
CONFIG_MVMDIO=y
CONFIG_MARVELL_PHY=y
CONFIG_AMD_PHY=y
CONFIG_XILINX_PHY=y

# Required by PZ BSP
CONFIG_USB_ACM=y
CONFIG_USB_F_ACM=m
CONFIG_USB_U_SERIAL=m
CONFIG_USB_CDC_COMPOSITE=m
CONFIG_I2C_XILINX=y
CONFIG_CFG80211=y
# CONFIG_MEDIA_SUPPORT is not set

# NFS server: the Zynq-7000 (arm) kernel defconfig omits NFSD (the zynqMP
# aarch64 defconfig has it), so the nfs-utils server / proc-fs-nfsd mount fails
# at boot on z7. Enable it for parity with the zynqMP targets.
CONFIG_NFSD=y
CONFIG_NFSD_V4=y
