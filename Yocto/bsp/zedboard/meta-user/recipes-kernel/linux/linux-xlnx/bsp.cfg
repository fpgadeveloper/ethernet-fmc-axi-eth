CONFIG_I2C_XILINX=y

# Required by all designs
CONFIG_XILINX_GMII2RGMII=y
CONFIG_NET_VENDOR_MARVELL=y
CONFIG_MVMDIO=y
CONFIG_MARVELL_PHY=y
CONFIG_AMD_PHY=y
CONFIG_XILINX_PHY=y

# Required by ZedBoard BSP
CONFIG_USB_SUSPEND=y
CONFIG_USB_OTG=y
CONFIG_USB_GADGET=y
CONFIG_USB_GADGET_XUSBPS=y
CONFIG_XILINX_ZED_USB_OTG=y
# CONFIG_USB_ETH is not set
# CONFIG_USB_ETH_RNDIS is not set
CONFIG_USB_ZERO=m

# NFS server: the Zynq-7000 (arm) kernel defconfig omits NFSD (the zynqMP
# aarch64 defconfig has it), so the nfs-utils server / proc-fs-nfsd mount fails
# at boot on z7. Enable it for parity with the zynqMP targets.
CONFIG_NFSD=y
CONFIG_NFSD_V4=y
